<body>
    <!-- Preloader -->




    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-container">
                <img src="logo.jpeg" alt="MRA Salon Logo" class="logo">
                <div class="salon-name">MRA SALON</div>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="services.html" class="nav-link">Services</a></li>
                <li><a href="styles.html" class="nav-link active">Styles</a></li>

                <li><a href="book.html" class="nav-link">Book</a></li>
                <li><a href="https://www.instagram.com/mrasalonofficial/" class="nav-link instagram-link" target="_blank" rel="noopener"><i class="fab fa-instagram"></i> Follow</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Haircut Styles Section -->
    <section class="styles-section" id="styles">
        <div class="container">
            <h2 class="section-title gold-text">Our Signature Styles</h2>
            <div class="styles-grid">
                <div class="style-card fade-in" data-service="Curly Hairstyle">
                    <img src="Curly_Hairstyle_hannusaraf_480x480.webp" alt="Curly Hairstyle">
                    <h3>Curly</h3>
                   
                </div>
                <div class="style-card fade-in" data-service="Long Wavy">
                    <img src="Long_and_Wavy_Hairstyle_Bhuvan_Bam_480x480.webp" alt="Long Wavy Hairstyle">
                    <h3>Long Wavy</h3>
                   
                </div>
                <div class="style-card fade-in" data-service="Man Bun">
                    <img src="Man_Bun_Hairstyle_480x480.webp" alt="Man Bun Hairstyle">
                    <h3>Man Bun</h3>
                   
                </div>
                <div class="style-card fade-in" data-service="Medium Curls">
                    <img src="Medium_Length_Curls_for_Indian_Men_480x480.webp" alt="Medium Curls">
                    <h3>Medium Curls</h3>
                   
                </div>
                <div class="style-card fade-in" data-service="Messy Quiff">
                    <img src="Messy_Quiff_with_Moustache_for_Men_with_Oval_Face_480x480.webp" alt="Messy Quiff">
                    <h3>Messy Quiff</h3>
                   
                </div>
                <div class="style-card fade-in" data-service="Pompadour">
                    <img src="Pompadour_Hairstyle_Ranveer_Singh_480x480.webp" alt="Pompadour Hairstyle">
                    <h3>Pompadour</h3>
                   
                </div>
                <div class="style-card fade-in" data-service="Ponytail">
                    <img src="Ponytail_Hairstyle_for_Men_with_Beard_480x480.webp" alt="Ponytail Hairstyle">
                    <h3>Ponytail</h3>
                   
                </div>
                <div class="style-card fade-in" data-service="Short Quiff">
                    <img src="Short_Quiff_Faded_Without_Beard_For_Indian_Men_480x480.webp" alt="Short Quiff">
                    <h3>Short Quiff</h3>
                   
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">

        </div>

    <!-- Service Modal -->
    <div id="serviceModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <div id="modalPrice"></div>
            <button id="modalBookBtn" class="gold-btn">Book This Service</button>
        </div>
    </div>
